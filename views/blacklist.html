<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blacklist — Biometria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c0f;
      --surface: #10141a;
      --surface-2: #13181f;
      --border: #1e2530;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.10);
      --accent-glow: rgba(0, 229, 255, 0.3);
      --warn: #ff4655;
      --warn-dim: rgba(255, 70, 85, 0.10);
      --warn-border: rgba(255, 70, 85, 0.3);
      --ok: #00e676;
      --text: #c8d6e5;
      --text-dim: #4a5a6a;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 48px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
      opacity: 0.4;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .back {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    .breadcrumb {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }
    .breadcrumb span { color: var(--warn); }

    /* header */
    .header { margin-bottom: 36px; }

    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--warn);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: var(--warn);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
    }

    .subtitle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 10px;
      letter-spacing: 0.05em;
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.05em;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok   { border-color: var(--ok); color: var(--ok); }
    #toast.err  { border-color: var(--warn); color: var(--warn); }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .panel.registered .panel-title { color: var(--accent); }
    .panel.blacklisted .panel-title { color: var(--warn); }

    .panel-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
    }

    /* list */
    .user-list {
      list-style: none;
      min-height: 80px;
    }

    .user-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .user-item:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .user-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-name::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .panel.blacklisted .user-name::before { background: var(--warn); }

    .btn-blacklist {
      padding: 5px 12px;
      background: var(--warn-dim);
      border: 1px solid var(--warn-border);
      border-radius: 4px;
      color: var(--warn);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-blacklist:hover {
      background: rgba(255, 70, 85, 0.2);
      box-shadow: 0 0 10px rgba(255, 70, 85, 0.2);
    }

    /* empty state */
    .empty {
      padding: 32px 18px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.08em;
    }

    /* loading */
    .loading {
      padding: 32px 18px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.08em;
    }

    .loading::after {
      content: '...';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <a href="/" class="back">← Inicio</a>
      <span class="breadcrumb">BIOMETRIA / <span>BLACKLIST</span></span>
    </div>

    <header class="header">
      <p class="eyebrow">Control de acceso</p>
      <h1>Blacklist</h1>
      <p class="subtitle">// Gestión de usuarios bloqueados del sistema</p>
    </header>

    <div class="grid">

      <div class="panel registered">
        <div class="panel-header">
          <span class="panel-title">Usuarios registrados</span>
          <span class="panel-count" id="reg-count">—</span>
        </div>
        <ul class="user-list" id="registered-list">
          <li class="loading">Cargando</li>
        </ul>
      </div>

      <div class="panel blacklisted">
        <div class="panel-header">
          <span class="panel-title">Lista negra</span>
          <span class="panel-count" id="bl-count">—</span>
        </div>
        <ul class="user-list" id="blacklist-list">
          <li class="loading">Cargando</li>
        </ul>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script>
    let toastTimer;

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.className = ''; }, 3000);
    }

    async function addUserToBlacklist(userName) {
      try {
        const response = await fetch(`/blacklist/${encodeURIComponent(userName)}`, { method: 'POST' });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || 'Error al añadir a la lista negra');
        showToast(data.message, 'ok');
        await Promise.all([loadRegistered(), loadBlacklist()]);
      } catch (error) {
        showToast(error.message, 'err');
      }
    }

    async function loadBlacklist() {
      const list = document.getElementById('blacklist-list');
      const count = document.getElementById('bl-count');
      try {
        const response = await fetch('/blacklist-faces');
        const data = await response.json();
        count.textContent = data.length;
        list.innerHTML = '';
        if (data.length === 0) {
          list.innerHTML = '<li class="empty">Sin usuarios bloqueados</li>';
          return;
        }
        data.forEach((item, i) => {
          const li = document.createElement('li');
          li.className = 'user-item';
          li.style.animationDelay = `${i * 40}ms`;
          li.innerHTML = `<span class="user-name">${item.name}</span>`;
          list.appendChild(li);
        });
      } catch {
        list.innerHTML = '<li class="empty">Error al cargar</li>';
      }
    }

    async function loadRegistered() {
      const list = document.getElementById('registered-list');
      const count = document.getElementById('reg-count');
      try {
        const response = await fetch('/registered-faces');
        const data = await response.json();
        count.textContent = data.length;
        list.innerHTML = '';
        if (data.length === 0) {
          list.innerHTML = '<li class="empty">Sin usuarios registrados</li>';
          return;
        }
        data.forEach((item, i) => {
          const li = document.createElement('li');
          li.className = 'user-item';
          li.style.animationDelay = `${i * 40}ms`;

          const nameSpan = document.createElement('span');
          nameSpan.className = 'user-name';
          nameSpan.textContent = item.name;

          const btn = document.createElement('button');
          btn.className = 'btn-blacklist';
          btn.textContent = 'Bloquear';
          btn.onclick = () => addUserToBlacklist(item.name);

          li.appendChild(nameSpan);
          li.appendChild(btn);
          list.appendChild(li);
        });
      } catch {
        list.innerHTML = '<li class="empty">Error al cargar</li>';
      }
    }

    window.onload = () => Promise.all([loadRegistered(), loadBlacklist()]);
  </script>
</body>
</html>
